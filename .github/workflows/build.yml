name: Build ziskos

on:
  workflow_dispatch:

jobs:
  build-zisklib:
    name: Build static libziskos.a for riscv64 zkvm
    runs-on: ubuntu-22.04
    env:
      TARGET: riscv64ima-zisk-zkvm-elf
      CC_riscv64imad_unknown_none_elf: riscv64-linux-gnu-gcc
      CXX_riscv64imad_unknown_none_elf: riscv64-linux-gnu-g++
      AR_riscv64imad_unknown_none_elf: riscv64-linux-gnu-ar
      CARGO_TARGET_RISCV64IMAD_UNKNOWN_NONE_ELF_LINKER: riscv64-linux-gnu-gcc
      #CARGO_TARGET_RISCV64IMA_ZISK_ZKVM_ELF_RUSTFLAGS: "-Cpasses=lower-atomic"
      # C toolchain for this exact target
      CC_riscv64imad-zisk-zkvm-elf: riscv64-linux-gnu-gcc
      CXX_riscv64imad-zisk-zkvm-elf: riscv64-linux-gnu-g++
      AR_riscv64imad-zisk-zkvm-elf: riscv64-linux-gnu-ar

      # Underscore variants (some crates check this form)
      CC_riscv64imad_zisk_zkvm_elf: riscv64-linux-gnu-gcc
      CXX_riscv64imad_zisk_zkvm_elf: riscv64-linux-gnu-g++
      AR_riscv64imad_zisk_zkvm_elf: riscv64-linux-gnu-ar

      # Rust linker
      CARGO_TARGET_RISCV64IMAD_ZISK_ZKVM_ELF_LINKER: riscv64-linux-gnu-gcc
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly
          rustup override set nightly
          rustup component add rust-src --toolchain nightly

      - name: Install riscv64 toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-riscv64-linux-gnu g++-riscv64-linux-gnu binutils-riscv64-linux-gnu gcc-riscv64-unknown-elf libopenmpi-dev nlohmann-json3-dev nasm libsodium-dev libomp-dev
      #   - name: Build cargo-zisk
      #     run: |
      #       cargo build -p cargo-zisk --release
      #   - name: Install ZisK toolchain
      #     run: |
      #       ./target/release/cargo-zisk sdk install-toolchain
      - name: Build ziskos static library
        run: |
          git apply ./.github/workflows/cargo.toml.patch
          git apply ./.github/workflows/entrypoint-no-entrypoint.patch
          cargo +nightly build --release --target ./riscv64imad-zisk-zkvm-elf.json -Z build-std=std,panic_abort -Z json-target-spec --features no_entrypoint
        #   cargo +zisk build -p ziskos --release --target "${TARGET}" --features no_entrypoint
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ziskos-${{ env.TARGET }}
          path: target/${{ env.TARGET }}/release/libziskos.a
