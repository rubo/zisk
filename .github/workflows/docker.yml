name: Build ZisK Binaries

on:
  push:
    branches: [pre-develop-0.16.0]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-binaries:
    name: Build binaries (linux-amd64)
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    env:
      TARGET: x86_64-unknown-linux-gnu
      PLATFORM_NAME: linux
      ARCH: amd64
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: default
          override: true
          target: ${{ env.TARGET }}

      - name: Install dependencies
        shell: bash
        run: |
          cd "$GITHUB_WORKSPACE/tools/test-env"
          ./install_deps.sh

      - name: Build binaries
        shell: bash
        run: cargo build --release --target "${TARGET}"

      - name: Package binaries
        id: package
        shell: bash
        run: |
          mkdir -p zisk-dist/bin

          cp "./target/${TARGET}/release/cargo-zisk"       zisk-dist/bin/
          cp "./target/${TARGET}/release/ziskemu"          zisk-dist/bin/
          cp "./target/${TARGET}/release/riscv2zisk"       zisk-dist/bin/
          cp "./target/${TARGET}/release/zisk-coordinator" zisk-dist/bin/
          cp "./target/${TARGET}/release/zisk-worker"      zisk-dist/bin/
          cp "./ziskup/ziskup"                             zisk-dist/bin/
          cp "./target/${TARGET}/release/libziskclib.a"    zisk-dist/bin/

          mkdir -p zisk-dist/zisk/emulator-asm/src
          cp -r ./emulator-asm/src zisk-dist/zisk/emulator-asm
          cp -r ./lib-c/ zisk-dist/zisk
          cp ./emulator-asm/Makefile zisk-dist/zisk/emulator-asm

          ARCHIVE_FILE="cargo_zisk_${PLATFORM_NAME}_${ARCH}.tar.gz"
          tar -czvf "${ARCHIVE_FILE}" -C zisk-dist .

          echo "archive_file=${ARCHIVE_FILE}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zisk-binaries-linux-amd64
          path: ${{ steps.package.outputs.archive_file }}
          if-no-files-found: error
          retention-days: 14
